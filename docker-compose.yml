services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: source_explorer
      POSTGRES_PASSWORD: source_explorer
      POSTGRES_DB: source_explorer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U source_explorer -d source_explorer"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["source-explorer-server", "--config", "/app/config/source-explorer.yaml"]
    environment:
      SOURCE_EXPLORER_CONFIG: /app/config/source-explorer.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./config/source-explorer.docker.yaml:/app/config/source-explorer.yaml:ro
    depends_on:
      db:
        condition: service_healthy

  indexer:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["source-explorer-indexer", "--config", "/app/config/source-explorer.yaml"]
    environment:
      SOURCE_EXPLORER_CONFIG: /app/config/source-explorer.yaml
    volumes:
      - ./config/source-explorer.docker.yaml:/app/config/source-explorer.yaml:ro
      - ./:/workspace/source-explorer:ro
      - indexer-cache:/app/.source-explorer
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres-data:
  indexer-cache:
